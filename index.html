let history = [];
let listInitialized = false;
let inArticle = false;

// ==========================
// CURSEUR GLOBAL
// ==========================
const cursor = document.createElement("span");
cursor.className = "cursor";

// ==========================
// MACHINE A ECRIRE
// ==========================
function typeText(text, element, speed, callback){
let i = 0;

function write(){
if(i < text.length){
element.innerHTML = text.substring(0, i);
element.appendChild(cursor);
i++;
setTimeout(write, speed);
}else{
element.innerHTML = text;
if(callback) callback();
}
}

write();
}

// ==========================
// CREATION LISTE
// ==========================
function initList(){

const list = document.getElementById("list");
list.innerHTML = "";
listInitialized = false;

let index = 0;

function typeItem(){

if(index < currentList.length){

const div = document.createElement("div");
div.classList.add("item");

list.appendChild(div);

typeText(currentList[index].title, div, 20, function(){
index++;
typeItem();
});

}else{
listInitialized = true;
updateSelection();
}

}

typeItem();
}

// ==========================
// SELECTION
// ==========================
function updateSelection(){

const items = document.querySelectorAll(".item");

items.forEach((item, i) => {

item.classList.remove("selected");

if(i === selectedIndex){
item.classList.add("selected");
item.appendChild(cursor);
}

});

}

// ==========================
// NAVIGATION
// ==========================
function moveUp(){
if(!listInitialized || inArticle) return;

if(selectedIndex > 0){
selectedIndex--;
updateSelection();
}
}

function moveDown(){
if(!listInitialized || inArticle) return;

if(selectedIndex < currentList.length - 1){
selectedIndex++;
updateSelection();
}
}

// ==========================
// OUVERTURE
// ==========================
function openSelected(){
if(inArticle) return;
openArticle(selectedIndex);
}

function openArticle(index){

const item = currentList[index];

// 🔹 SI DOSSIER
if(item.children){
history.push(currentList);
currentList = item.children;
selectedIndex = 0;
initList();
return;
}

// 🔹 SINON ARTICLE
inArticle = true;

document.getElementById("list").style.display = "none";
document.getElementById("executeBtn").style.display = "none";
document.getElementById("arrows").style.display = "none";

detail.style.display = "block";
detail.innerHTML = "";

typeText(
item.title + "\n\n" + item.content,
detail,
20,
function(){
detail.innerHTML += `<br><br><button onclick="back()">RETOUR</button>`;
}
);

}

// ==========================
// RETOUR
// ==========================
function initList(){

    const list = document.getElementById("list");
    list.innerHTML = "";
    listInitialized = false;

    let index = 0;

    function typeItem(){

        if(index < currentList.length){

            const div = document.createElement("div");
            div.classList.add("item");

            list.appendChild(div);

            typeText(currentList[index].title, div, 20, function(){
                index++;
                typeItem();
            });

        } else {
            listInitialized = true;
            updateSelection();

            // 🔹 Ajout du bouton retour pour chaque menu
            if(history.length > 0){ // seulement si on n’est pas au menu principal
                const backBtn = document.createElement("button");
                backBtn.innerText = "RETOUR";
                backBtn.onclick = back;
                backBtn.style.display = "block";
                backBtn.style.marginTop = "10px";
                list.appendChild(backBtn);
            }
        }

    }

    typeItem();
}
  
  
  
  
  
function back(){

// 🔹 SI ARTICLE → revenir au dossier actuel
if(inArticle){
inArticle = false;

document.getElementById("detail").style.display = "none";
document.getElementById("list").style.display = "block";
document.getElementById("executeBtn").style.display = "block";
document.getElementById("arrows").style.display = "block";

updateSelection();
return;
}

// 🔹 SI MENU → remonter d’un niveau
if(history.length > 0){
currentList = history.pop();
selectedIndex = 0;
initList();
}

}

// ==========================
// LANCEMENT
// ==========================
typeText(intro, document.getElementById("terminal"), 25, initList);

</script>
