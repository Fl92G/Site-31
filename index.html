<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Terminal Fallout</title>

<style>
:root{
  --green:#00ff88;
}

body {
  margin: 0;
  height: 100vh;
  background-color: #000;
  color: var(--green);
  font-family: monospace;
  overflow: hidden;
  position: relative;

  /* léger glow global */
  text-shadow:
    0 0 2px var(--green),
    0 0 5px var(--green);
}

/* lignes vertes CRT */
body::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;

  background: repeating-linear-gradient(
    rgba(0, 255, 136, 0.12) 0px,
    rgba(0, 255, 136, 0.12) 1px,
    transparent 1px,
    transparent 3px
  );

  animation: scanline 1.4s linear infinite;
}

/* effet scintillement */
@keyframes scanline {
  0% { background-position: 0 0; }
  100% { background-position: 0 3px; }
}
</style>

</head>

<body>
<h1>Bienvenue sur mon terminal Fallout</h1>
<p>Le style CRT est appliqué avec des lignes vertes et un fond noir.</p>
</body>
</html>
