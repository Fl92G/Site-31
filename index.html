<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABRI 31 TERMINAL</title>

<style>

body{
background:black;
color:#11ff15;
font-family:"Courier New", monospace;
margin:0;
padding:20px;
overflow:hidden;
}

/* glow */
.glow{
text-shadow: 0 0 5px #11ff15, 0 0 10px #11ff15, 0 0 20px #11ff15;
}

/* écran centré */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
text-align:center;
}

/* input */
input{
background:black;
border:1px solid #11ff15;
color:#11ff15;
padding:10px;
font-size:20px;
text-align:center;
}

/* curseur */
.cursor{
display:inline-block;
width:10px;
background:#11ff15;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

/* contenu caché */
#content{
display:none;
padding-top:20px;
}

/* menu */
.menu a{
display:block;
color:#11ff15;
text-decoration:none;
margin:5px 0;
}

.menu a:hover{
background:#11ff15;
color:black;
}

/* articles */
.article{
margin-top:30px;
border-left:2px solid #11ff15;
padding-left:10px;
}

</style>

</head>

<body>

<!-- écran verrouillé -->
<div id="lock" class="center glow">
<p>_</p>
<p>ENTRER CODE D'ACCES</p>
<input type="password" id="code" maxlength="4">
<p id="error"></p>
</div>

<!-- contenu -->
<div id="content" class="glow">

<div id="terminal"></div>

<div class="menu">
<p>> MENU</p>
<a href="#">> Accueil</a>
<a href="#">> Actualités</a>
<a href="#">> Risques</a>
<a href="#">> Protection</a>
</div>

<div id="articles"></div>

</div>

<script>

// vérification code
document.getElementById("code").addEventListener("keyup", function(){
if(this.value === "1234"){
document.getElementById("lock").style.display = "none";
document.getElementById("content").style.display = "block";
startTyping();
}
});

// texte terminal
const intro = `
INITIALISATION...
ACCES AUTORISE

BIENVENUE DANS L'ABRI 31

MISSION :
SURVEILLANCE MONDIALE
ANALYSE DES MENACES
PROTECTION DES POPULATIONS

`;

const articles = `
> SITUATION MONDIALE
Les tensions internationales restent élevées entre grandes puissances.

> RISQUE DE GUERRE MONDIALE
Le risque dépend fortement des décisions politiques et militaires.

> RISQUE NUCLEAIRE
Les armes existent toujours. La dissuasion reste active.

> PROTECTION
Prévoir eau, nourriture, lampe, radio et suivre les consignes officielles.

`;

let i = 0;
let j = 0;

function typeText(text, element, speed, callback){
let index = 0;

function write(){
if(index < text.length){
element.innerHTML += text.charAt(index);
index++;
setTimeout(write, speed);
}else if(callback){
callback();
}
}
write();
}

function startTyping(){

const terminal = document.getElementById("terminal");
const art = document.getElementById("articles");

// intro
typeText(intro, terminal, 25, function(){

// articles après
typeText(articles, art, 20);

});

}

</script>

</body>
</html>
